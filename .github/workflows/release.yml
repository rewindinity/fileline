name: Build & Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.asset_name }})
    runs-on: ${{ matrix.runner }}

    strategy:
      matrix:
        include:
          - runner: ubuntu-latest
            goos: linux
            goarch: amd64
            asset_name: linux-amd64

          - runner: ubuntu-latest
            goos: linux
            goarch: arm64
            asset_name: linux-arm64
            cc: aarch64-linux-gnu-gcc

          - runner: macos-13
            goos: darwin
            goarch: amd64
            asset_name: macos-intel

          - runner: macos-latest
            goos: darwin
            goarch: arm64
            asset_name: macos-arm

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install ARM64 cross-compiler (Linux ARM64 only)
        if: matrix.goarch == 'arm64' && matrix.goos == 'linux'
        run: sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 1
          CC: ${{ matrix.cc }}
        run: |
          go build \
            -trimpath \
            -ldflags="-s -w -X main.version=${{ github.ref_name }}" \
            -o "fileline-${{ matrix.asset_name }}" \
            .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: fileline-${{ matrix.asset_name }}
          path: fileline-${{ matrix.asset_name }}
          retention-days: 1

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums and build release body
        id: checksums
        working-directory: dist
        run: |
          echo "## SHA256 Checksums" > notes.md
          echo "" >> notes.md
          echo '```' >> notes.md
          sha256sum fileline-* >> notes.md
          echo '```' >> notes.md
          echo "notes_path=$PWD/notes.md" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
          body_path: ${{ steps.checksums.outputs.notes_path }}
          files: |
            dist/fileline-*
