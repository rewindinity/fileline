<!doctype html>
<html data-theme="{{if .Settings}}{{.Settings.Theme}}{{else}}dark-blue{{end}}" style="--accent: {{if .Settings}}{{.Settings.AccentColor}}{{else}}#3b82f6{{end}};">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{if .T.twofa}}{{index .T.twofa "verify_title"}}{{else}}2FA Verification{{end}} - FileLine</title>
    <link rel="icon" href="{{if and .Settings .Settings.CustomLogo}}{{safeURL .Settings.CustomLogo}}{{else}}/static/logo.svg{{end}}" />
    <link rel="stylesheet" href="/static/icons.css" />
    <link rel="stylesheet" href="/static/style.css" />
  </head>
  <body>
    <div class="container">
      <div class="card login-card">
        <div class="logo">
          <img src="{{if and .Settings .Settings.CustomLogo}}{{safeURL .Settings.CustomLogo}}{{else}}/static/logo.svg{{end}}" class="logo-icon" alt="FileLine" />
          <h1>FileLine</h1>
          <p class="subtitle">{{if .T.twofa}}{{index .T.twofa "verify_title"}}{{else}}Two-Factor Authentication{{end}}</p>
        </div>

        {{if .Error}}
        <div class="alert alert-error"><i class="bx bxs-error-circle"></i> {{.Error}}</div>
        {{end}}

        <p class="text-muted" style="margin-bottom: 1rem">{{if .T.twofa}}{{index .T.twofa "verify_prompt"}}{{else}}Enter the 6-digit code from your authenticator app.{{end}}</p>

        <form method="POST" action="/login/2fa">
          <div class="form-group">
            <label for="code">{{if .T.twofa}}{{index .T.twofa "auth_code"}}{{else}}Authentication Code{{end}}</label>
            <input
              type="text"
              id="code"
              name="code"
              required
              autofocus
              pattern="[0-9]{6}"
              maxlength="6"
              autocomplete="one-time-code"
              style="text-align: center; font-size: 1.5rem; letter-spacing: 0.5em"
            />
          </div>
          <button type="submit" class="btn btn-primary btn-full">{{if .T.twofa}}{{index .T.twofa "verify"}}{{else}}Verify{{end}}</button>
        </form>
      </div>
    </div>
  </body>
</html>
